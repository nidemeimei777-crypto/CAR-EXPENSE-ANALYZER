services:
  db:
    image: postgres:15
    container_name: car_expense_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: car_expense_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d car_expense_db"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - car_expense_network

  web:
    build: .
    container_name: car_expense_app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - car_expense_network
    restart: true

networks:
  car_expense_network:
    driver: bridge

volumes:
  postgres_data:
