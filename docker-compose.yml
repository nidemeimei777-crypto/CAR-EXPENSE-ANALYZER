services:
  car_api:
    build: .
    command: sh -c 'alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 80 --workers 4'
    volumes:
      - .:/app
    ports:
      - "80:80"
    env_file: ".env"
    networks:
      - car-expense-network
    depends_on:
      car_db:
        condition: service_healthy
        restart: true

  car_db:
    image: postgres:12.5
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - car_postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./postgres.env
    ports:
      - "5432:5432"
    networks:
      - car-expense-network

networks:
  car-expense-network:
    driver: bridge

volumes:
  car_postgres_data:
